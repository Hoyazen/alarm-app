name: CI — React CSR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Build de production
  build:
    name: Build de production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Installation des dépendances
        run: npm install --frozen-lockfile

      - name: Build React (CSR)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /alarm-app/

      - name: Upload des artefacts de build
        uses: actions/upload-artifact@v7
        with:
          name: out
          path: out/ # le dossier  "out" est générer lors de la compilation en CSR
          retention-days: 7
  # 2. Déploiement
  deploy:
    name: Déploiement (GitHub Pages)
    runs-on: ubuntu-latest
    needs: build
    # ne se déclenche que sur la branche main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Téléchargement des artefacts de build
        uses: actions/download-artifact@v8
        with:
          name: out
          path: out/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload vers GitHub Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: out/

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5